name: Build and Push

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      - name: Build and Load
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: shubham-portfolio:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

